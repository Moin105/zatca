name: Gemini QA Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get changed files
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} -- '*.ts' '*.tsx' '*.js' > diff.txt

      - name: Trim diff (avoid token limit)
        run: |
          head -c 12000 diff.txt > trimmed.txt

      - name: Send to Gemini
        run: |
          curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "contents": [{
              "parts":[
                {"text":"You are a strict senior QA/architect reviewer.\n\nReview ONLY the provided diff. Enforce architecture layering and lifecycle rules for this repo (NestJS backend + Next.js frontend):\n\nBackend architecture (strict):\n- Controllers: only routing/DTO validation, no business logic.\n- Services: business logic and orchestration.\n- Entities/DB: TypeORM entity rules, immutability, migrations/sync safety.\n- Cross-cutting: auth/guards, audit logs, error handling, config.\n\nFrontend architecture (strict):\n- Pages/components: UI only, no direct secrets, calls via api client.\n- Data formatting: handle decimal-as-string (toFixed safety), null safety.\n\nLifecycle & correctness checks (must evaluate):\n- Create -> Issue -> Immutable: ensure issued docs cannot be modified/deleted and hash chain integrity is preserved.\n- Sequence/ID generation: deterministic and per-company where applicable.\n- Security: auth guard coverage, injection risks, unsafe parsing, secrets handling, SSR/CSR issues.\n- Data validation: DTO validation completeness; reject unexpected/protected fields.\n- File I/O: paths are safe, no traversal, directories created correctly.\n- Error handling: no silent failures that hide critical compliance issues.\n\nOutput format (STRICT):\n1) Summary (1-3 bullets)\n2) Architecture violations (layering) — list with file/line references when possible\n3) Lifecycle/compliance risks — list\n4) Security risks — list\n5) Recommended fixes — specific, minimal diffs\n\nBe direct. If no issues, say \"No issues found\".\n\nDIFF:\n\n'"$(cat trimmed.txt)"'"}
              ]
            }]
          }' > response.json

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('response.json', 'utf8'));
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "No issues found.";

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Gemini QA Review (strict):\n\n" + text
            });