name: Gemini QA Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get changed files
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} -- '*.ts' '*.tsx' '*.js' > diff.txt

      - name: Trim diff (avoid token limit)
        run: |
          head -c 12000 diff.txt > trimmed.txt

      - name: Send to Gemini
        run: |
          curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "contents": [{
              "parts":[
                {"text":"You are a senior QA engineer. Review this code diff and find bugs, security issues, and improvements. Be concise:\n\n'"$(cat trimmed.txt)"'"}
              ]
            }]
          }' > response.json

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('response.json', 'utf8'));
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "No issues found.";

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 Gemini QA Review:\n\n" + text
            });